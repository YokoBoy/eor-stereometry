<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Профиль - Stereometry Online</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="apple-touch-icon" sizes="57x57" href="/apple-icon-57x57.png">
  <link rel="apple-touch-icon" sizes="60x60" href="/apple-icon-60x60.png">
  <link rel="apple-touch-icon" sizes="72x72" href="/apple-icon-72x72.png">
  <link rel="apple-touch-icon" sizes="76x76" href="/apple-icon-76x76.png">
  <link rel="apple-touch-icon" sizes="114x114" href="/apple-icon-114x114.png">
  <link rel="apple-touch-icon" sizes="120x120" href="/apple-icon-120x120.png">
  <link rel="apple-touch-icon" sizes="144x144" href="/apple-icon-144x144.png">
  <link rel="apple-touch-icon" sizes="152x152" href="/apple-icon-152x152.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-icon-180x180.png">
  <link rel="icon" type="image/png" sizes="192x192"  href="/android-icon-192x192.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="msapplication-TileColor" content="#ffffff">
  <meta name="msapplication-TileImage" content="/ms-icon-144x144.png">
  <meta name="theme-color" content="#ffffff">
</head>
<body>
  <nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
      <a class="navbar-brand" href="/">Stereometry<span class="text-dark">Online</span></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto" id="navLinks"></ul>
      </div>
    </div>
  </nav>

  <div class="container my-5 main-page-content">
    <div class="row">
      <div class="col-lg-4 mb-4">
        <div class="card text-center">
          <div class="card-body">
            <div class="mb-3">
              <div class="d-inline-flex align-items-center justify-content-center bg-primary text-white rounded-circle" style="width: 80px; height: 80px; font-size: 2rem;">
                👤
              </div>
            </div>
            <h4 class="card-title" id="profileName">Загрузка...</h4>
            <p class="text-muted" id="profileEmail">...</p>
            <div class="mt-3">
              <span class="points-display">💎 <span id="profilePoints">0</span> очков</span>
            </div>
          </div>
        </div>
      </div>
      
      <div class="col-lg-8">
        <div class="card mb-4">
          <div class="card-header bg-white fw-bold">Мой прогресс</div>
          <div class="card-body">
            <div class="row text-center mb-4">
              <div class="col-6">
                <div class="h2 text-primary" id="statWatched">0</div>
                <div class="text-muted small">Просмотрено видео</div>
              </div>
              <div class="col-6">
                <div class="h2 text-primary" id="statTotal">0</div>
                <div class="text-muted small">Всего видео</div>
              </div>
            </div>
            <div class="progress" style="height: 25px;">
              <div class="progress-bar" id="progressBar" role="progressbar" style="width: 0%">
                <span id="progressText">0%</span>
              </div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-header bg-white fw-bold">Достижения</div>
          <div class="card-body">
            <div id="achievementsList" class="d-flex flex-wrap">
              <!-- Achievements loaded here -->
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
